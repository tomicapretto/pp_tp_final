name: Sortear orden de presentacion

on:
  workflow_dispatch:
    inputs:
      seed:
        description: Seed publica para reproducir el sorteo
        required: true
        type: string

permissions:
  contents: write

jobs:
  sortear:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5

      - name: Instalar Python
        run: uv python install

      - name: Instalar dependencias
        run: uv sync --locked

      - name: Ejecutar sorteo
        env:
          SORTEO_SEED: ${{ inputs.seed }}
        run: uv run python scripts/sortear.py --seed "$SORTEO_SEED"

      - name: Commit del resultado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add orden-presentacion.md

          if git diff --cached --quiet; then
            echo "No hubo cambios para commitear."
          else
            git commit -m "Generar orden de presentacion"
            git push
          fi
